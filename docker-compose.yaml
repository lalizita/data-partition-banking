services:
  finance_db_0:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db_0
    ports:
      - 5432:5432
    volumes:
      - ./scripts/init.finance.sql:/docker-entrypoint-initdb.d/init.sql
  finance_db_1:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db_1
    ports:
      - 5433:5432
    volumes:
      - ./scripts/init.finance.sql:/docker-entrypoint-initdb.d/init.sql
  account_db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: account_db
    ports:
      - 5434:5432
    volumes:
      - ./scripts/init.account.sql:/docker-entrypoint-initdb.d/init.sql